name: Build Native Installers

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Desktop Profile with Maven
        run: mvn clean package -Pdesktop

      - name: Create Windows MSI Installer
        if: runner.os == 'Windows'
        run: |
          jpackage --type msi --dest target/dist --name AsmSimulator --input target/libs --main-jar asm-visualizer-1.0-SNAPSHOT.jar --main-class io.github.AaditS22.asmsimulator.Launcher --win-dir-chooser --win-shortcut --win-menu --win-shortcut-prompt --win-menu-group "AsmSimulator" --icon src/main/resources/favicon.ico

      - name: Create macOS DMG Installer
        if: runner.os == 'macOS'
        run: |
          jpackage --type dmg --dest target/dist --name AsmSimulator --input target/libs --main-jar asm-visualizer-1.0-SNAPSHOT.jar --main-class io.github.AaditS22.asmsimulator.Launcher --mac-package-name "Asm Simulator" --icon src/main/resources/favicon.icns

      - name: Install Linux Prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Create Linux DEB Installer
        if: runner.os == 'Linux'
        run: |
          jpackage --type deb --dest target/dist --name asmsimulator --input target/libs --main-jar asm-visualizer-1.0-SNAPSHOT.jar --main-class io.github.AaditS22.asmsimulator.Launcher --linux-shortcut --linux-menu-group "Development" --icon src/main/resources/favicon.png

      - name: Upload Installers as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AsmSimulator-Installers-${{ matrix.os }}
          path: target/dist/*
          retention-days: 7
