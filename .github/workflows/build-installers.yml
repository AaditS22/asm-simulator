name: Build Native Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Desktop Profile with Maven
        run: mvn clean package -Pdesktop

      - name: Create Windows MSI Installer
        if: runner.os == 'Windows'
        run: |
          jpackage --type msi --dest target/dist --name AsmSimulator --input target/libs --main-jar asm-visualizer-1.0-SNAPSHOT.jar --main-class io.github.AaditS22.asmsimulator.Launcher --win-dir-chooser --win-shortcut --win-menu --win-shortcut-prompt --win-menu-group "AsmSimulator" --icon src/main/resources/favicon.ico --java-options "-Dfile.encoding=UTF-8 -Dstdout.encoding=UTF-8 -Dstderr.encoding=UTF-8"

      - name: Create macOS DMG Installer
        if: runner.os == 'macOS'
        run: |
          jpackage --type dmg --dest target/dist --name AsmSimulator --input target/libs --main-jar asm-visualizer-1.0-SNAPSHOT.jar --main-class io.github.AaditS22.asmsimulator.Launcher --mac-package-name "Asm Simulator" --icon src/main/resources/favicon.icns --java-options "-Dfile.encoding=UTF-8 -Dstdout.encoding=UTF-8 -Dstderr.encoding=UTF-8"

      - name: Install Linux Prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Create Linux DEB Installer
        if: runner.os == 'Linux'
        run: |
          jpackage --type deb --dest target/dist --name asmsimulator --input target/libs --main-jar asm-visualizer-1.0-SNAPSHOT.jar --main-class io.github.AaditS22.asmsimulator.Launcher --linux-shortcut --linux-menu-group "Development" --icon src/main/resources/favicon.png --java-options "-Dfile.encoding=UTF-8 -Dstdout.encoding=UTF-8 -Dstderr.encoding=UTF-8"

      - name: Upload Installers as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AsmSimulator-Installers-${{ matrix.os }}
          path: target/dist/*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          pattern: AsmSimulator-Installers-*
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: installers/*
          draft: false
          prerelease: false